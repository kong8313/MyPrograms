{{- if and .Values.global.pdb.enabled .Values.pdb.enabled -}}
{{- if semverCompare ">=1.21-0" .Capabilities.KubeVersion.GitVersion -}}
apiVersion: policy/v1
{{- else -}}
apiVersion: policy/v1beta1
{{- end }}
kind: PodDisruptionBudget
metadata:
  name: {{ template "cati-supervisor-legacy-client.fullname" . }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels: {{- include "cati-supervisor-legacy-client.selectorLabels" . | nindent 6 }}
{{- end }}
