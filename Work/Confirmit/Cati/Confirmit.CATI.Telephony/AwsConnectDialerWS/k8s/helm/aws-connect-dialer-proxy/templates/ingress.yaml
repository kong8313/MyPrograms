{{- if and .Values.global.ingress.enabled .Values.ingress.enabled -}}
{{- $fullName := include "aws-connect-dialer-proxy.fullname" . -}}
{{- $ingressPath := .Values.ingress.path -}}
{{- if and (semverCompare ">=1.19-0" .Capabilities.KubeVersion.GitVersion)  }}
apiVersion: networking.k8s.io/v1
{{- else }}
apiVersion: networking.k8s.io/v1beta1
{{- end }}
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels: {{ include "aws-connect-dialer-proxy.labels" . | nindent 4 }}
{{- with .Values.ingress.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
{{- end }}
spec:
  ingressClassName: {{ default .Values.global.ingress.ingressClassName .Values.ingress.ingressClassName }}
{{- if .Values.ingress.tls }}
  tls:
  {{- range .Values.ingress.tls }}
    - hosts:
      {{- range .hosts }}
        - {{ . }}
      {{- end }}
      secretName: {{ .secretName }}
  {{- end }}
{{- end }}
  rules:
  {{- range default .Values.global.ingress.hosts .Values.ingress.hosts }}
    - host: {{ . }}
      http:
        paths:
          - path: {{ $ingressPath }}
{{- if and (semverCompare ">=1.19-0" $.Capabilities.KubeVersion.GitVersion)  }}
            pathType: {{ $.Values.ingress.pathType }}
            backend:
              service:
                name: {{ $fullName }}
                port:
                  name: http
{{- else }}
            backend:
              serviceName: {{ $fullName }}
              servicePort: http
{{- end }}
  {{- end }}
{{- end }}
